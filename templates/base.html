<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}GATE Result Calculator{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}"/>
  {% block head %}{% endblock %}
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <div class="logo">
        <span class="logo-gate">GATE</span>
        <span class="logo-sub">Result Calculator</span>
      </div>
      <nav>
        <a href="{{ url_for('index') }}">New Calculation</a>
      </nav>
    </div>
  </header>

  <main class="main-content">
    {% block content %}{% endblock %}
  </main>

  <footer class="site-footer">
    <p>GATE Result Calculator &nbsp;·&nbsp; Results are indicative only.</p>
  </footer>
</body>
</html>
